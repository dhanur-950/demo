<!DOCTYPE html>
<html>
<head>
    <title>EC2 + RDS Employee App</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f4f6f9;
        }

        .header {
            background: #111827;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            width: 80%;
            margin: auto;
            margin-top: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0px 2px 10px rgba(0,0,0,0.1);
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
        }

        button {
            padding: 10px 15px;
            background: #2563eb;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        .output {
            margin-top: 10px;
            padding: 10px;
            background: #0f172a;
            color: #22c55e;
        }
    </style>
</head>

<body>

<div class="header">
    <h2>Employee Management System (AWS EC2 + RDS)</h2>
</div>

<div class="container">

    <!-- HEALTH CHECK -->
    <div class="card">
        <h3>Health Check</h3>
        <button onclick="health()">Check</button>
        <div id="healthRes" class="output"></div>
    </div>

    <!-- ADD EMPLOYEE -->
    <div class="card">
        <h3>Add Employee</h3>

        <input type="text" id="empName" placeholder="Employee Name">
        <input type="text" id="empDept" placeholder="Department">

        <button onclick="saveEmp()">Save</button>

        <div id="saveRes" class="output"></div>
    </div>

    <!-- GET EMPLOYEE -->
    <div class="card">
        <h3>Get Employee by ID</h3>

        <input type="number" id="empId">

        <button onclick="getEmp()">Get</button>

        <div id="getRes" class="output"></div>
    </div>

    <!-- DELETE EMPLOYEE -->
    <div class="card">
        <h3>Delete Employee</h3>

        <input type="number" id="delId">

        <button onclick="deleteEmp()">Delete</button>

        <div id="delRes" class="output"></div>
    </div>

</div>

<script>

    const BASE_URL = "";

    // HEALTH CHECK
    function health() {
        fetch(BASE_URL + "/healthCheck")
        .then(res => res.text())
        .then(data => {
            document.getElementById("healthRes").innerText = data;
        });
    }

    // SAVE EMPLOYEE
    function saveEmp() {

        let emp = {
    name: document.getElementById("empName").value,
    dept: document.getElementById("empDept").value
};

        fetch(BASE_URL + "/save", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(emp)
        })
        .then(res => res.text())
        .then(data => {
            document.getElementById("saveRes").innerText = data;
        });
    }

    // GET EMPLOYEE
    function getEmp() {

        let id = document.getElementById("empId").value;

        fetch(BASE_URL + "/get/" + id)
        .then(res => res.json())
        .then(data => {
            document.getElementById("getRes").innerText =
                JSON.stringify(data);
        })
        .catch(err => {
            document.getElementById("getRes").innerText =
                "Error fetching employee";
        });
    }

    // DELETE EMPLOYEE
    function deleteEmp() {

        let id = document.getElementById("delId").value;

        fetch(BASE_URL + "/delete/" + id, {
            method: "DELETE"
        })
        .then(res => res.text())
        .then(data => {
            document.getElementById("delRes").innerText = data;
        });
    }

</script>

</body>
</html>
